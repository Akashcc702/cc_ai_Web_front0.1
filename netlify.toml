# ================================
# CC-AI — Netlify Configuration
# ================================

# Ensure correct MIME types for all assets
[[headers]]
  for = "/*.mp4"
  [headers.values]
    Content-Type = "video/mp4"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css"

[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

# All routes serve index.html (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
