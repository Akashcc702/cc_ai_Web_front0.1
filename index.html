<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CC-AI</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">

  <!-- Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <!-- Marked.js -->
  <script src="https://unpkg.com/marked@9.1.6/marked.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══ CUSTOM CURSOR ═══ -->
  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>

  <!-- ═══ THREE.JS CANVAS ═══ -->
  <canvas id="three-canvas"></canvas>

  <!-- ═══ SPLASH INTRO ═══ -->
  <div id="splash">
    <video id="introVideo" autoplay muted playsinline preload="auto">
      <source src="intro.mp4" type="video/mp4">
    </video>
    <div class="splash-overlay">
      <div class="splash-content">
        <div class="splash-logo">✦</div>
        <div class="splash-brand">CC<span>—</span>AI</div>
        <div class="splash-sub">INTELLIGENT COMPANION</div>
        <div class="splash-bar"><div class="splash-fill"></div></div>
      </div>
    </div>
  </div>

  <!-- ═══ APP ═══ -->
  <div id="app">

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">✦</span>
        <span class="sidebar-title">CC—AI</span>
      </div>
      <button id="newChat" class="new-chat-btn">
        <span class="btn-icon">+</span>
        <span>New Thread</span>
      </button>
      <div class="sidebar-label">RECENT</div>
      <div id="chatList"></div>
    </aside>

    <!-- MAIN -->
    <main id="main">
      <header id="app-header">
        <div class="header-left">
          <span class="header-mark">✦</span>
          <span class="header-name">CC—AI</span>
        </div>
        <div class="header-right">
          <span class="header-status">
            <span class="status-dot"></span>
            ONLINE
          </span>
        </div>
      </header>

      <div id="chat-wrap">
        <div id="chat-empty">
          <div class="empty-icon">✦</div>
          <div class="empty-title">What can I help you with?</div>
          <div class="empty-sub">Ask me anything — code, ideas, analysis, or just a conversation.</div>
          <div class="empty-chips">
            <div class="chip" data-prompt="Explain quantum computing simply">Quantum computing</div>
            <div class="chip" data-prompt="Write a Python web scraper">Python scraper</div>
            <div class="chip" data-prompt="Give me creative writing tips">Creative writing</div>
            <div class="chip" data-prompt="How does Three.js work?">Three.js intro</div>
          </div>
        </div>
        <div id="chat"></div>
      </div>

      <div id="input-area">
        <div class="input-wrap">
          <textarea id="msg" placeholder="Ask anything..." rows="1" autocomplete="off"></textarea>
          <button id="sendBtn" title="Send (Enter)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <div class="input-hint">Enter to send · Shift+Enter for new line</div>
      </div>
    </main>

  </div>

  <!-- BURST CANVAS -->
  <canvas id="burst-canvas"></canvas>

  <script src="three-scene.js"></script>
  <script src="animations.js"></script>
  <script src="tour.js"></script>
  <script src="app.js"></script>
</body>
</html>
