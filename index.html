<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CC-AI</title>

  <!-- Favicon — prevents 404 error -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Marked.js — unpkg (more reliable, no storage issues) -->
  <script src="https://unpkg.com/marked@9.1.6/marked.min.js"></script>
</head>

<body>

  <!-- 🌌 BACKGROUND ANIMATION CANVAS -->
  <canvas id="bg-canvas"></canvas>
  <div id="cursor-glow"></div>

  <!-- 🎬 VIDEO CINEMATIC INTRO SPLASH -->
  <div id="splash">
    <video id="introVideo" autoplay muted playsinline preload="auto">
      <source src="intro.mp4" type="video/mp4">
    </video>
    <div class="overlay">
      <div class="splash-brand">CC-AI</div>
    </div>
  </div>

  <!-- 💬 APP -->
  <div id="app">

    <div id="sidebar">
      <button id="newChat">+ New Chat</button>
      <div id="chatList"></div>
    </div>

    <div id="main">
      <header id="app-header">
        <span class="header-logo">✦</span> CC-AI
        <span class="header-tagline">Your Intelligent Companion</span>
      </header>
      <div id="chat"></div>

      <div id="input-area">
        <input id="msg" placeholder="Ask anything..." autocomplete="off">
        <button id="sendBtn" title="Send (Enter)">➤</button>
      </div>
    </div>

  </div>

  <!-- 💥 BURST CANVAS for micro-animations -->
  <canvas id="burst-canvas"></canvas>

  <script src="animations.js"></script>
  <script src="tour.js"></script>
  <script src="app.js"></script>

</body>
</html>
